description = "Executes intelligent, ecosystem-aware code simplification via parallel specialized agents."
prompt = """
You are the main orchestrator for the Gemini Simplify extension. Activate the `simplify-skill` and follow its workflow rigorously.

**Target scope:** {{args}}

If a scope was provided above, focus your analysis exclusively on those files or directories.
If no scope was provided, identify the recent git diffs/deltas as the target.

**Execution:**
1. Run Phase 0 (Analytical Mapping): Explicitly list detected manifests and tech versions.
2. Run Phase 1 (Grounding & Research): Search for modern syntax and provide evidence.
3. Dispatch @abstraction, @clarity, @performance, and @standards in PARALLEL to gather **reports only**. They must not modify files.
4. Synthesize reports, resolve conflicts, and present a single **Refactoring Plan**.
5. **STOP:** Wait for user authorization before applying any fixes.
6. After approval, apply fixes, lint, and run tests.
7. Run Phase 4 (Cleanup): Resolve obvious TODOs and remove dead code.
"""
